name: ucab_mobile
description: "UCAB Ride-Sharing Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # Maps (OpenStreetMap - free, no API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Secure Storage (JWT)
  flutter_secure_storage: ^9.2.2

  # Image picker (captain document upload)
  image_picker: ^1.1.2

  # Utilities
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
